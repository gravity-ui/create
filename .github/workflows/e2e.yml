name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - uses: actions/cache@v4
        id: cache
        with:
          path: node_modules
          key: node_modules-${{ hashFiles('package-lock.json') }}
      - if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: lib
          path: lib
          include-hidden-files: true

  test-cli:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ hashFiles('package-lock.json') }}
      - uses: actions/download-artifact@v4
        with:
          name: lib
          path: lib
      - run: node $GITHUB_WORKSPACE/lib/index.js --yes --out plain-app --language ts --no-frontend --no-backend
        working-directory: /tmp
        env:
          NO_COLOR: '1'
      - name: Build and run scaffolded plain-ts project
        working-directory: /tmp/plain-app
        run: |
          npm install
          npm run build
          npm start --silent | tee /tmp/plain-app-output.txt
      - name: Assert CLI output
        run: grep -q "Hello, world!" /tmp/plain-app-output.txt
      - name: Lint generated package
        working-directory: /tmp/plain-app
        run: npm run lint

  test-e2e-browser:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ hashFiles('package-lock.json') }}
      - uses: actions/download-artifact@v4
        with:
          name: lib
          path: lib
      - run: node $GITHUB_WORKSPACE/lib/index.js --yes --out full-app --language ts --frontend --backend --react --styles
        working-directory: /tmp
        env:
          NO_COLOR: '1'
      - name: Install
        working-directory: /tmp/full-app
        run: npm install
      - name: Lint generated package
        working-directory: /tmp/full-app
        run: npm run lint
      - run: npx playwright install --with-deps chromium
      - name: Run Playwright against the scaffolded app
        run: npx playwright test
        env:
          E2E_APP_DIR: /tmp/full-app
          APP_PORT: '3000'
